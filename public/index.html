<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSphere | Enterprise Agent</title>
    <!-- Using Inter font for that clean SaaS look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #09090b;
            --bg-panel: #18181b;
            --border: #27272a;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --primary: #ffffff;
            --primary-invert: #000000;
            --accent: #3b82f6; /* Subtle blue for links/highlights */
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Clean Header */
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .logo { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; letter-spacing: -0.02em; }
        .workspace-badge { background: var(--bg-panel); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

        main { flex: 1; overflow-y: auto; padding: 2.5rem 2rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }

        /* Enterprise Cards */
        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            gap: 1.25rem;
            max-width: 768px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: fadeIn 0.3s ease-out;
        }
        
        .card-icon { font-size: 1.5rem; background: var(--bg-app); border: 1px solid var(--border); height: 48px; width: 48px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); flex-shrink: 0; }
        .card-content { flex: 1; }
        .card-content h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
        .card-content p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.25rem; }
        
        .metric-badge {
            background: var(--bg-app);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-right: 0.5rem;
            display: inline-block;
        }

        /* Professional Buttons */
        .btn {
            background: var(--primary);
            color: var(--primary-invert);
            border: 1px solid var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            margin-right: 0.5rem;
        }
        .btn:hover { background: #e4e4e7; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--bg-app); border-color: #3f3f46; }

        /* Quick Actions (Filter Chips) */
        .quick-actions {
            display: flex;
            gap: 0.5rem;
            padding: 0 2rem;
            max-width: 800px;
            margin: 0 auto;
            overflow-x: auto;
            padding-bottom: 1rem;
            scrollbar-width: none;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
        }
        .chip:hover { border-color: #52525b; color: var(--text-main); }

        /* Input Area */
        .input-area {
            padding: 1.5rem 2rem 2rem 2rem;
            background: var(--bg-app);
            border-top: 1px solid var(--border);
        }
        .input-container {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }
        input {
            width: 100%;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus { outline: none; border-color: #52525b; box-shadow: 0 0 0 1px #52525b; }
        input::placeholder { color: #52525b; }

        /* Sleek Loading Status */
        .loading-status {
            display: none;
            align-items: center;
            gap: 0.75rem;
            max-width: 768px;
            margin: 0 auto;
            padding: 0.5rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--text-muted);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            EchoSphere
            <span class="workspace-badge">Agent Workspace</span>
        </div>
    </header>

    <main id="feed">
        <div class="card">
            <div class="card-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <div class="card-content">
                <h3>System Ready</h3>
                <p>EchoSphere is connected to live data sources. Enter a natural language query below to dispatch the agent for web research, market analysis, or automated tasks.</p>
            </div>
        </div>
    </main>

    <!-- Professional Loading Indicator -->
    <div id="loadingStatus" class="loading-status">
        <div class="spinner"></div>
        <span id="statusText">Processing request...</span>
    </div>

    <div class="quick-actions">
        <div class="chip" onclick="setInput('Find remote React Developer jobs posted this week')">Remote Jobs</div>
        <div class="chip" onclick="setInput('What is the current price of Bitcoin and top crypto news today?')">Market Analysis</div>
        <div class="chip" onclick="setInput('Find a cheap flight from New York to London for next month')">Travel Logistics</div>
        <div class="chip" onclick="setInput('Find the best price for a Sony WH-1000XM5 headphone')">Procurement</div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <input type="text" id="taskInput" placeholder="Enter instructions (e.g., 'Analyze competitor pricing for...')" onkeypress="if(event.key === 'Enter') handleTask()">
        </div>
    </div>

    <script>
        function setInput(text) {
            document.getElementById('taskInput').value = text;
            handleTask();
        }

        async function handleTask() {
            const input = document.getElementById('taskInput');
            const task = input.value;
            if(!task) return;
            
            input.value = '';
            
            // Clean Status Animation
            const loader = document.getElementById('loadingStatus');
            const statusText = document.getElementById('statusText');
            loader.style.display = 'flex';
            
            const phases = [
                "Querying external data sources...",
                "Aggregating real-time results...",
                "Formatting protocol response..."
            ];
            
            let phaseIndex = 0;
            statusText.innerText = phases[0];
            const phaseInterval = setInterval(() => {
                phaseIndex++;
                if(phaseIndex < phases.length) statusText.innerText = phases[phaseIndex];
            }, 1500);

            try {
                const response = await fetch('/api/dispatch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task })
                });
                
                const data = await response.json();
                
                clearInterval(phaseInterval);
                loader.style.display = 'none';
                
                renderCard(data);
                
            } catch (err) {
                clearInterval(phaseInterval);
                statusText.innerText = "Request failed. Check system logs.";
                setTimeout(() => { loader.style.display = 'none'; }, 3000);
            }
        }

        function renderCard(data) {
            const feed = document.getElementById('feed');
            const metricsHtml = data.metrics.map(m => `<span class="metric-badge">${m}</span>`).join('');
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-icon">${data.icon || '⚡'}</div>
                <div class="card-content">
                    <h3>${data.title}</h3>
                    <p>${data.desc}</p>
                    <div style="margin-bottom: 1.25rem;">${metricsHtml}</div>
                    <div class="action-buttons">
                        <button class="btn" onclick="window.open('${data.realUrl}', '_blank')">${data.primaryAction}</button>
                        <button class="btn btn-outline" onclick="this.parentElement.parentElement.parentElement.remove()">Dismiss</button>
                    </div>
                </div>
            `;
            feed.appendChild(card);
            feed.scrollTop = feed.scrollHeight;
        }
    </script>
</body>
</html>
